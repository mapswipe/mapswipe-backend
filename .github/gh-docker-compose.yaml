services:
  firebase-test:
    image: ghcr.io/mapswipe/mapswipe-firebase:0.0.1-dev
    build: !reset null

  test:
    image: $DOCKER_IMAGE
    build: !reset null
    env_file: !reset null
    environment:
      CI: "true"
    volumes:
      - ./coverage/:/code/coverage/
      - ./ci-share/:/ci-share/

  web: !reset null
  worker-beat: !reset null
  worker: !reset null
